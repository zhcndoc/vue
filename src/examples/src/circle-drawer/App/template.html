<svg @click="onClick">
  <foreignObject x="0" y="40%" width="100%" height="200">
    <p class="tip">
      点击画布绘制圆。点击某个圆可选中它。
      在画布上右键可以调整当前选中圆的半径。
    </p>
  </foreignObject>
  <circle
    v-for="circle in circles"
    :cx="circle.cx"
    :cy="circle.cy"
    :r="circle.r"
    :fill="circle === selected ? '#ccc' : '#fff'"
    @click="selected = circle"
    @contextmenu.prevent="adjust(circle)"
  ></circle>
</svg>

<div class="controls">
  <button @click="undo" :disabled="index <= 0">撤销</button>
  <button @click="redo" :disabled="index >= history.length - 1">重做</button>
</div>

<div class="dialog" v-if="adjusting" @click.stop>
  <p>调整位于 ({{ selected.cx }}, {{ selected.cy }}) 的圆的半径</p>
  <input type="range" v-model="selected.r" min="1" max="300">
</div>
