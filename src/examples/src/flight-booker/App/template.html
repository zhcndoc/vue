<select v-model="flightType">
  <option value="one-way flight">单程航班</option>
  <option value="return flight">往返航班</option>
</select>

<input type="date" v-model="departureDate">
<input type="date" v-model="returnDate" :disabled="!isReturn">

<button :disabled="!canBook" @click="book">预订</button>

<p>{{ canBook ? '' : '返程日期必须晚于出发日期。' }}</p>
